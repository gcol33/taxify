url: https://gillescolling.com/taxify/
template:
  bootstrap: 5
  bootswatch: sandstone
  light-switch: yes
  includes:
    in_header: |
      <script>
      window.MathJax = {
        tex: {
          inlineMath: [["$", "$"], ["\\(", "\\)"]],
          displayMath: [["$$", "$$"], ["\\[", "\\]"]]
        },
        chtml: { linebreaks: { automatic: true, width: "90% container" } },
        svg: { linebreaks: { automatic: true, width: "90% container" } },
        options: { renderActions: { addMenu: [] } }
      };
      </script>
figures:
  dev: svglite
  fig.ext: svg
  bg: '#F5F6F8'
navbar:
  structure:
    left:
    - intro
    - reference
    - articles
    right:
    - search
    - github
    - lightswitch
articles:
- title: Getting started
  navbar: Getting started
  contents:
  - quickstart
  - migration
- title: Core features
  navbar: Core features
  contents:
  - backends
  - fuzzy-matching
  - enrichments
  - custom-data
- title: Special topics
  navbar: Special topics
  contents:
  - hybrid-names
  - large-scale
